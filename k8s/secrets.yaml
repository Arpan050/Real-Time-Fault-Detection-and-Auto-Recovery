# In production, use Vault or External Secrets Operator instead of plain Secrets.
# This is for local dev only — values are base64("postgres")
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: microservices
type: Opaque
data:
  # echo -n "postgres" | base64
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=
